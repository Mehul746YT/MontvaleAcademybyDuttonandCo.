<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../logo.png">
    <title>Strategic Partners | Montvale Academy</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding: 50px 20px;
            color: #333;
        }
        .card {
            background: white;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { border-bottom: 2px solid #333; display: inline-block; padding-bottom: 10px; }
        .partners-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            margin-top: 40px;
        }
        .partner-item img {
            max-width: 150px;
            filter: grayscale(100%);
            opacity: 0.6;
            transition: all 0.3s ease;
        }
        .partner-item:hover img {
            filter: grayscale(0%);
            opacity: 1;
            transform: scale(1.05);
        }
        button {
            margin-top: 40px;
            padding: 10px 25px;
            background: #333;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background: #555; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Strategic Partners</h1>
        <p>Montvale Academy collaborates with leading global institutions to ensure our curriculum meets the highest standards of professional rigor.</p>
        
        <div class="partners-grid">
            <div class="partner-item">
                <img src="../logo1.png" alt="Partner 1">
                <p>Coming Soon</p>
            </div>
            <div class="partner-item">
                <img src="../logo2.png" alt="Partner 2">
                <p>Coming soon</p>
            </div>
            <div class="partner-item">
                <img src="../logo3.png" alt="Partner 3">
                <p>Coming soon</p>
            </div>
        </div>
        
        <button onclick="window.location.href='../index'">Return to Assessment</button>
    </div>

</body>
</html>
